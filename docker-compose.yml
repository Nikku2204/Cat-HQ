# Cat HQ — M0 scaffold
# Two services: FastAPI backend + go2rtc (video restreamer).
# Runs on any Docker host, x86 or ARM. See README.md for quickstart.

services:
  backend:
    build:
      context: .                  # repo root: the image also builds frontend/
      dockerfile: backend/Dockerfile
    container_name: cathq-backend
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data              # SQLite lives here from M3 on
    restart: unless-stopped
    # M5.5: a Govee power_cycle mid-flight at shutdown must run to completion
    # (OFF→delay→ON) so a restart can't strand the LR4's mains OFF. The Govee
    # adapter's stop() waits out an in-flight cycle (~200s worst case); give
    # Docker's SIGTERM the same grace so it isn't SIGKILLed first. Normal
    # shutdowns return immediately (the power lock is free).
    stop_grace_period: 210s
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  go2rtc:
    image: alexxit/go2rtc:1.9.14  # pinned (was :latest) — bump deliberately
    container_name: cathq-go2rtc
    env_file: .env                # supplies TAPO_CAM_* to the ${vars} in go2rtc.yaml
    ports:
      - "1984:1984"               # go2rtc web UI / API
      - "8554:8554"               # RTSP restream
      - "8555:8555/tcp"           # WebRTC
      - "8555:8555/udp"
    volumes:
      - ./go2rtc/go2rtc.yaml:/config/go2rtc.yaml:ro
    restart: unless-stopped
    # M6 note: on the Linux home box, consider switching this service to
    # `network_mode: host` (and deleting `ports:`) — it simplifies WebRTC.
