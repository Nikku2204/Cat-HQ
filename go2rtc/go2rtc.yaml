# go2rtc — Cat HQ video restreamer
# Wired up for real at M6. Until then this file just needs to exist and parse;
# go2rtc only connects to a stream when a client asks for it.
# ${VARS} are substituted from the container environment (compose env_file).

streams:
  cat_cam:
    - rtsp://${TAPO_CAM_USER}:${TAPO_CAM_PASS}@${TAPO_CAM_IP}:554/stream1   # HD
    # - rtsp://${TAPO_CAM_USER}:${TAPO_CAM_PASS}@${TAPO_CAM_IP}:554/stream2 # SD

api:
  listen: ":1984"

rtsp:
  listen: ":8554"

webrtc:
  listen: ":8555"
